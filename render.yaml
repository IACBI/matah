# Render.com blueprint — deploy with one click via "New > Blueprint".
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: quibble
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
