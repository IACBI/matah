# Render.com blueprint — deploy with one click via "New > Blueprint".
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: quibble
    runtime: node
    plan: free
    # NODE_ENV=production makes npm skip devDependencies, but the build needs
    # them (vite, typescript). --include=dev forces them in for the build step.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
